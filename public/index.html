<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsHub Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,sans-serif;background:radial-gradient(circle at top,#4338ca,#111827 65%);min-height:100vh}
.glass{background:rgba(255,255,255,.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.15)}
</style>
</head>
<body class="p-4 md:p-8 text-white">
<div class="max-w-6xl mx-auto">
<header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
<div>
<h1 class="text-4xl font-black">🏆 SportsHub Pro</h1>
<p class="text-white/70">Modern athlete management dashboard</p>
</div>
<div class="glass rounded-2xl px-5 py-3 grid grid-cols-3 gap-4 text-center">
<div><p id="countAll" class="text-2xl font-bold">0</p><span class="text-xs text-white/70">Athletes</span></div>
<div><p id="countSports" class="text-2xl font-bold">0</p><span class="text-xs text-white/70">Sports</span></div>
<div><p id="liveClock" class="text-sm font-semibold"></p><span class="text-xs text-white/70">Live</span></div>
</div>
</header>
<div class="grid lg:grid-cols-3 gap-6">
<section class="glass rounded-3xl p-6 lg:col-span-1">
<h2 id="formTitle" class="text-2xl font-bold mb-4">Add Athlete</h2>
<input type="hidden" id="personId">
<div class="space-y-4">
<input id="name" placeholder="Athlete name" class="w-full p-3 rounded-xl text-gray-900">
<input id="sports" placeholder="Cricket, Football, Tennis" class="w-full p-3 rounded-xl text-gray-900">
<div class="flex gap-3">
<button onclick="saveData()" id="saveBtn" class="flex-1 bg-indigo-500 hover:bg-indigo-600 rounded-xl py-3 font-bold">Save</button>
<button onclick="resetForm()" id="cancelBtn" class="hidden flex-1 bg-white/20 rounded-xl py-3 font-bold">Cancel</button>
</div>
</div>
</section>
<section class="lg:col-span-2 space-y-5">
<div class="glass rounded-3xl p-5 grid md:grid-cols-2 gap-4">
<input id="nameSearch" onkeyup="filter()" placeholder="🔍 Search by name" class="p-3 rounded-xl text-gray-900">
<input id="sportSearch" onkeyup="filter()" placeholder="⚽ Filter by sport" class="p-3 rounded-xl text-gray-900">
</div>
<div id="list" class="grid md:grid-cols-2 gap-4"></div>
</section>
</div>
</div>
<script>
function clock(){document.getElementById('liveClock').innerText=new Date().toLocaleTimeString()} setInterval(clock,1000);clock();
async function fetchAll(){const res=await fetch('/api/persons');const data=await res.json();render(data);stats(data)}
function stats(data){document.getElementById('countAll').innerText=data.length;const s=new Set();data.forEach(p=>p.favoriteSports.forEach(x=>s.add(x)));document.getElementById('countSports').innerText=s.size}
function render(data){const c=document.getElementById('list');if(!data.length){c.innerHTML='<div class="glass p-6 rounded-2xl">No athletes found</div>';return;} c.innerHTML=data.map(p=>`<div class='person-item glass rounded-3xl p-5 shadow-xl hover:-translate-y-1 transition'> <div class='flex justify-between gap-3'><div><h3 class='text-xl font-bold'>${p.name}</h3><div class='mt-3 flex flex-wrap gap-2'>${p.favoriteSports.map(s=>`<span class='px-3 py-1 rounded-full bg-white/20 text-xs'>${s}</span>`).join('')}</div></div></div><div class='mt-4 flex gap-3'><button onclick="editMode('${p._id}','${p.name}','${p.favoriteSports.join(', ')}')" class='flex-1 bg-indigo-500 rounded-xl py-2'>Edit</button><button onclick="deletePerson('${p._id}')" class='flex-1 bg-red-500 rounded-xl py-2'>Delete</button></div></div>`).join('')}
async function saveData(){const id=personId.value;const payload={name:name.value.trim(),sports:sports.value.trim()};if(!payload.name||!payload.sports)return alert('Fill all fields');const method=id?'PUT':'POST';const url=id?`/api/persons/${id}`:'/api/persons';await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});resetForm();fetchAll()}
async function deletePerson(id){if(confirm('Delete athlete?')){await fetch(`/api/persons/${id}`,{method:'DELETE'});fetchAll()}}
function editMode(id,n,s){personId.value=id;name.value=n;sports.value=s;formTitle.innerText='Edit Athlete';saveBtn.innerText='Update';cancelBtn.classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}
function resetForm(){personId.value='';name.value='';sports.value='';formTitle.innerText='Add Athlete';saveBtn.innerText='Save';cancelBtn.classList.add('hidden')}
function filter(){const nq=nameSearch.value.toLowerCase(),sq=sportSearch.value.toLowerCase();document.querySelectorAll('.person-item').forEach(i=>{const t=i.innerText.toLowerCase();const nm=i.querySelector('h3').innerText.toLowerCase();i.style.display=(nm.includes(nq)&&t.includes(sq))?'block':'none'})}
fetchAll();
</script>
</body>
</html>
